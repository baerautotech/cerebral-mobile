name: Native App Build

on:
  push:
    branches: [main, develop]
    paths:
      - 'apps/native/**'
      - 'packages/**'
      - '.github/workflows/native-build.yml'
  pull_request:
    branches: [main, develop]
    paths:
      - 'apps/native/**'
      - 'packages/**'

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 9.0.0
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: 'pnpm'
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Lint (native)
        run: pnpm --filter cerebral-native lint

  test:
    runs-on: macos-latest
    strategy:
      matrix:
        node-version: [20.x]

    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 9.0.0

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'pnpm'

      - name: Run tests
        run: |
          pnpm install --frozen-lockfile
          pnpm --filter cerebral-native test -- --passWithNoTests

  build:
    needs: [lint, test]
    if: github.event_name == 'push'
    runs-on: cerebral-k8s-runners
    strategy:
      matrix:
        node-version: [20.x]

    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 9.0.0

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install

      - name: Read package version
        id: version
        run: echo "version=$(jq -r .version package.json)" >> $GITHUB_OUTPUT

      - name: Build Docker image and push to registry
        id: build
        uses: baerautotech/cerebral-deployment/.github/actions/build-with-kaniko@main
        with:
          image-name: 'cerebral/native'
          dockerfile: 'apps/native/Dockerfile'
          context: '.'

      - name: Verify Docker image
        run: |
          echo "✅ Native app Docker image built successfully!"
          echo "Image: ${{ steps.build.outputs.image }}"
