name: Image Tag Enforcement
on:
  pull_request:
    paths:
      - '**/*.yaml'
      - '**/*.yml'
jobs:
  enforce:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4.1.1
      - name: Fail on :latest image tags
        run: |
          # Scan YAML only (ignore docs) and avoid self-matching the workflow file.
          if grep -R --include="*.yml" --include="*.yaml" "image: .*:la""test" -n .; then
            echo 'Found :latest image tags. Use immutable SHAs.'
            exit 1
          fi
